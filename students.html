<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Listing</title>


  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>


<body>


<div class="container-fluid">
  <div class="row">


    <!-- Sidebar -->
    <div class="col-md-2 sidebar">
      <h4>CodeNest</h4>
      <a href="index.html">Dashboard</a>
      <a href="#" class="active">Students</a>
      <a href="#">Mentors</a>
      <a href="#">Batches</a>
      <a href="#">Reports</a>
      <a href="#">Certificates</a>
      <a href="#">Recruiters</a>
    </div>


    <!-- Main Content -->
    <div class="col-md-10">


      <!-- Navbar -->
      <div class="navbar-custom d-flex justify-content-end">
        <span><a href="#">Profile</a> | <a href="#">Logout</a></span>
      </div>


      <div class="p-4">


        <!-- Title -->
        <h3 class="mb-4">Students</h3>


        <!-- Controls -->
        <div class="d-flex justify-content-between align-items-center mb-3">


          <!-- Left: Search + Filter -->
          <div class="d-flex gap-2">


            <input type="text" class="form-control search-box" placeholder="Search students...">


            <select class="form-select">
              <option>Filter: Batch</option>
              <option>Batch A</option>
              <option>Batch B</option>
            </select>


          </div>


          <!-- Right: Button -->
          <button class="btn btn-success">+ Add Student</button>


        </div>


        <!-- Table -->
        <div class="card p-3">
          <table class="table table-hover">


            <thead class="table-light">
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Batch</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>


            <tbody>
              <tr>
                <td>A</td>
                <td>a@gmail.com</td>
                <td>Batch A</td>
                <td class="text-success">Active</td>
                <td>
                  <button class="btn btn-sm btn-outline-primary">View</button>
                  <button class="btn btn-sm btn-success">Edit</button>
                </td>
              </tr>


              <tr>
                <td>B</td>
                <td>b@gmail.com</td>
                <td>Batch B</td>
                <td class="text-success">Active</td>
                <td>
                  <button class="btn btn-sm btn-outline-primary">View</button>
                  <button class="btn btn-sm btn-success">Edit</button>
                </td>
              </tr>


              <tr>
                <td>C</td>
                <td>c@gmail.com</td>
                <td>Batch A</td>
                <td class="text-danger">Inactive</td>
                <td>
                  <button class="btn btn-sm btn-outline-primary">View</button>
                  <button class="btn btn-sm btn-success">Edit</button>
                </td>
              </tr>
            </tbody>


          </table>
        </div>


      </div>
    </div>


  </div>
</div>


</body>
</html>
