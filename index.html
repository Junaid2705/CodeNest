<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Institute Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container-fluid">
      <div class="row">
        <!-- Sidebar -->
        <div class="col-md-2 sidebar">
          <h4>CodeNest</h4>
          <a href="#" class="active">Dashboard</a>
          <a href="students.html">Students</a>
          <a href="mentors.html">Mentors</a>
          <a href="batches.html">Batches</a>
          <a href="#">Reports</a>
          <a href="#">Certificates</a>
          <a href="#">Recruiters</a>
        </div>

        <!-- Main Content -->
        <div class="col-md-10">
          <!-- Navbar -->
          <div class="navbar-custom d-flex justify-content-end">
            <span><a href="#">Profile</a> | <a href="#">Logout</a></span>
          </div>

          <div class="p-4">
            <!-- Cards -->
            <div class="row g-3">
              <div class="col-md-3">
                <div class="card p-3">
                  <h6>Total Students</h6>
                  <h3>120</h3>
                </div>
              </div>

              <div class="col-md-3">
                <div class="card p-3">
                  <h6>Total Mentors</h6>
                  <h3>25</h3>
                </div>
              </div>

              <div class="col-md-3">
                <div class="card p-3">
                  <h6>Active Batches</h6>
                  <h3>10</h3>
                </div>
              </div>

              <div class="col-md-3">
                <div class="card p-3">
                  <h6>Programs</h6>
                  <h3>5</h3>
                </div>
              </div>
            </div>

            <!-- Table -->
            <div class="mt-5">
              <h4>Recent Students</h4>

              <table class="table table-bordered table-hover mt-3">
                <thead class="table-light">
                  <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Batch</th>
                  </tr>
                </thead>

                <tbody>
                  <tr>
                    <td>A</td>
                    <td>a@gmail.com</td>
                    <td>Batch A</td>
                  </tr>

                  <tr>
                    <td>B</td>
                    <td>b@gmail.com</td>
                    <td>Batch B</td>
                  </tr>

                  <tr>
                    <td>C</td>
                    <td>c@gmail.com</td>
                    <td>Batch C</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  
  
  </body>
</html>
