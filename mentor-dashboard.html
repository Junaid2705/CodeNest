<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Mentor Dashboard</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container-fluid">
      <div class="row">
        <!-- Sidebar (Mentor) -->
        <div class="col-md-2 sidebar">
          <h4>CodeNest</h4>
          <a href="#" class="active">Dashboard</a>
          <a href="mystudents.html">My Students</a>
          <a href="attendance.html">Attendance</a>
          <a href="feedback.html">Feedback</a>
        </div>

        <!-- Main Content -->
        <div class="col-md-10">
          <!-- Navbar -->
          <div class="navbar-custom d-flex justify-content-end">
            <span><a href="#">Profile</a> | <a href="#">Logout</a></span>
          </div>

          <div class="main-content">
            <!-- Header -->
            <h3 class="mb-4">Mentor Dashboard</h3>

            <!-- Cards -->
            <div class="row g-3 mb-4">
              <div class="col-md-4">
                <div class="card p-3">
                  <h6>Total Students</h6>
                  <h3>25</h3>
                </div>
              </div>

              <div class="col-md-4">
                <div class="card p-3">
                  <h6>Attendance Today</h6>
                  <h3>20 / 25</h3>
                </div>
              </div>

              <div class="col-md-4">
                <div class="card p-3">
                  <h6>Pending Feedback</h6>
                  <h3>5</h3>
                </div>
              </div>
            </div>

            <!-- Student Table -->
            <div class="card p-3">
              <h5 class="mb-3">Assigned Students</h5>

              <table class="table table-hover align-middle">
                <thead>
                  <tr>
                    <th>Name</th>
                    <th>Batch</th>
                    <th>Status</th>
                    <th>Action</th>
                  </tr>
                </thead>

                <tbody>
                  <tr>
                    <td>A</td>
                    <td>Batch A</td>
                    <td class="text-success">Present</td>
                    <td>
                      <button class="btn btn-sm btn-primary">Mark</button>
                      <button class="btn btn-sm btn-outline-secondary">
                        Feedback
                      </button>
                    </td>
                  </tr>

                  <tr>
                    <td>B</td>
                    <td>Batch B</td>
                    <td class="text-danger">Absent</td>
                    <td>
                      <button class="btn btn-sm btn-primary">Mark</button>
                      <button class="btn btn-sm btn-outline-secondary">
                        Feedback
                      </button>
                    </td>
                  </tr>

                  <tr>
                    <td>C</td>
                    <td>Batch A</td>
                    <td class="text-success">Present</td>
                    <td>
                      <button class="btn btn-sm btn-primary">Mark</button>
                      <button class="btn btn-sm btn-outline-secondary">
                        Feedback
                      </button>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
