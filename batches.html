<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Batches</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container-fluid">
      <div class="row">
        <!-- Sidebar -->
        <div class="col-md-2 sidebar">
          <h4>CodeNest</h4>
          <a href="index.html">Dashboard</a>
          <a href="students.html">Students</a>
          <a href="mentors.html">Mentors</a>
          <a href="#" class="active">Batches</a>
          <a href="#">Reports</a>
          <a href="#">Certificates</a>
          <a href="#">Recruiters</a>
        </div>

        <!-- Main Content -->
        <div class="col-md-10">
          <!-- Navbar -->
          <div class="navbar-custom d-flex justify-content-end">
            <span><a href="#">Profile</a> | <a href="#">Logout</a></span>
          </div>

          <div class="main-content">
            <!-- Header -->
            <div class="d-flex justify-content-between align-items-center mb-4">
              <div>
                <h3 class="mb-0">Batches</h3>
                <!-- <small class="text-muted">Manage all training batches</small> -->
              </div>
              <button class="btn btn-primary shadow-sm">+ Add Batch</button>
            </div>

            <!-- Table Card -->
            <div class="card p-3 batch-card">
              <table class="table table-hover align-middle batch-table">
                <thead class="table-light">
                  <tr>
                    <th>Batch</th>
                    <th>Program</th>
                    <th>Start Date</th>
                    <th>Mentor</th>
                    <th>Status</th>
                    <th>Action</th>
                  </tr>
                </thead>

                <tbody>
                  <tr>
                    <td><strong>Batch A</strong></td>
                    <td><span class="program-tag">Full Stack</span></td>
                    <td>01 Jan 2026</td>
                    <td>J</td>
                    <td><span class="badge bg-success">Active</span></td>
                    <td class="batch-actions">
                      <button class="btn btn-sm btn-outline-primary">
                        Edit
                      </button>
                      <button class="btn btn-sm btn-outline-danger">
                        Delete
                      </button>
                    </td>
                  </tr>

                  <tr>
                    <td><strong>Batch B</strong></td>
                    <td><span class="program-tag">Data Science</span></td>
                    <td>10 Feb 2026</td>
                    <td>A</td>
                    <td>
                      <span class="badge bg-warning text-dark">Upcoming</span>
                    </td>
                    <td class="batch-actions">
                      <button class="btn btn-sm btn-outline-primary">
                        Edit
                      </button>
                      <button class="btn btn-sm btn-outline-danger">
                        Delete
                      </button>
                    </td>
                  </tr>

                  <tr>
                    <td><strong>Batch C</strong></td>
                    <td><span class="program-tag">AI/ML</span></td>
                    <td>15 Mar 2026</td>
                    <td>C</td>
                    <td><span class="badge bg-secondary">Completed</span></td>
                    <td class="batch-actions">
                      <button class="btn btn-sm btn-outline-primary">
                        Edit
                      </button>
                      <button class="btn btn-sm btn-outline-danger">
                        Delete
                      </button>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
