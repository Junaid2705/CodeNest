<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Attendance</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container-fluid">
      <div class="row">
        <!-- Sidebar -->
        <div class="col-md-2 sidebar">
          <h4>CodeNest</h4>
          <a href="mentor-dashboard.html">Dashboard</a>
          <a href="mystudents.html">My Students</a>
          <a href="#" class="active">Attendance</a>
          <a href="feedback.html">Feedback</a>
        </div>

        <!-- Main -->
        <div class="col-md-10">
          <div class="navbar-custom d-flex justify-content-end">
            <span><a href="#">Profile</a> | <a href="#">Logout</a></span>
          </div>

          <div class="main-content">
            <h3 class="mb-4">Mark Attendance</h3>

            <!-- Table -->
            <div class="card p-3">
              <table class="table table-hover align-middle">
                <thead>
                  <tr>
                    <th>Name</th>
                    <th>Batch</th>
                    <th>Status</th>
                  </tr>
                </thead>

                <tbody>
                  <tr>
                    <td>A</td>
                    <td>Batch A</td>
                    <td>
                      <select class="form-select">
                        <option>Present</option>
                        <option>Absent</option>
                      </select>
                    </td>
                  </tr>

                  <tr>
                    <td>B</td>
                    <td>Batch B</td>
                    <td>
                      <select class="form-select">
                        <option>Present</option>
                        <option>Absent</option>
                      </select>
                    </td>
                  </tr>
                </tbody>
              </table>

              <div class="mt-3 text-end">
                <button class="btn btn-primary">Save Attendance</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
