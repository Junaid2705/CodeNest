<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Feedback</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container-fluid">
      <div class="row">
        <!-- Sidebar -->
        <div class="col-md-2 sidebar">
          <h4>CodeNest</h4>
          <a href="mentor-dashboard.html">Dashboard</a>
          <a href="mystudents.html">My Students</a>
          <a href="attendance.html">Attendance</a>
          <a href="#" class="active">Feedback</a>
        </div>

        <!-- Main -->
        <div class="col-md-10">
          <div class="navbar-custom d-flex justify-content-end">
            <span><a href="#">Profile</a> | <a href="#">Logout</a></span>
          </div>

          <div class="main-content">
            <h3 class="mb-4">Give Feedback</h3>

            <div class="card p-4">
              <form>
                <!-- Student Name -->
                <div class="mb-3">
                  <label class="form-label">Student</label>
                  <select class="form-select">
                    <option>Select Student</option>
                    <option>A</option>
                    <option>B</option>
                  </select>
                </div>

                <!-- Feedback -->
                <div class="mb-3">
                  <label class="form-label">Feedback</label>
                  <textarea
                    class="form-control"
                    rows="4"
                    placeholder="Write feedback..."
                  ></textarea>
                </div>

                <!-- Rating -->
                <div class="mb-3">
                  <label class="form-label">Rating</label>
                  <select class="form-select">
                    <option>Excellent</option>
                    <option>Good</option>
                    <option>Average</option>
                    <option>Poor</option>
                  </select>
                </div>

                <!-- Submit -->
                <div class="text-end">
                  <button class="btn btn-primary">Submit</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
