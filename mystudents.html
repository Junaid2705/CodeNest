<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Students</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container-fluid">
      <div class="row">
        <!-- Sidebar -->
        <div class="col-md-2 sidebar">
          <h4>CodeNest</h4>
          <a href="mentor-dashboard.html">Dashboard</a>
          <a href="#" class="active">My Students</a>
          <a href="attendance.html">Attendance</a>
          <a href="feedback.html">Feedback</a>
        </div>

        <!-- Main -->
        <div class="col-md-10">
          <div class="navbar-custom d-flex justify-content-end">
            <span><a href="#">Profile</a> | <a href="#">Logout</a></span>
          </div>

          <div class="main-content">
            <h3 class="mb-4">My Students</h3>

            <!-- Table -->
            <div class="card p-3">
              <table class="table table-hover align-middle">
                <thead>
                  <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Batch</th>
                    <th>Status</th>
                    <th>Action</th>
                  </tr>
                </thead>

                <tbody>
                  <tr>
                    <td>A</td>
                    <td>a@gmail.com</td>
                    <td>Batch A</td>
                    <td class="text-success">Active</td>
                    <td>
                      <button class="btn btn-sm btn-outline-primary">
                        View
                      </button>
                      <button class="btn btn-sm btn-primary">Feedback</button>
                    </td>
                  </tr>

                  <tr>
                    <td>B</td>
                    <td>b@gmail.com</td>
                    <td>Batch B</td>
                    <td class="text-danger">Inactive</td>
                    <td>
                      <button class="btn btn-sm btn-outline-primary">
                        View
                      </button>
                      <button class="btn btn-sm btn-primary">Feedback</button>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
