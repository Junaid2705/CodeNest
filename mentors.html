<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mentor Listing</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <div class="container-fluid">
      <div class="row">
        <!-- Sidebar -->
        <div class="col-md-2 sidebar">
          <h4>CodeNest</h4>
          <a href="index.html">Dashboard</a>
          <a href="students.html">Students</a>
          <a href="#" class="active">Mentors</a>
          <a href="#">Batches</a>
          <a href="#">Reports</a>
          <a href="#">Certificates</a>
          <a href="#">Recruiters</a>
        </div>

        <!-- Main Content -->
        <div class="col-md-10">
          <!-- Navbar -->
          <div class="navbar-custom d-flex justify-content-end">
            <span><a href="#">Profile</a> | <a href="#">Logout</a></span>
          </div>

          <div class="p-4">
            <!-- Title -->
            <h3 class="mb-4">Mentors</h3>

            <!-- Controls -->
            <div class="d-flex justify-content-between align-items-center mb-3 mentor-controls">
              <div class="d-flex gap-2">
                <input
                  type="text"
                  class="form-control"
                  placeholder="Search mentors..."
                />

                <select class="form-select">
                  <option>Filter: Expertise</option>
                  <option>Java</option>
                  <option>React</option>
                </select>
              </div>

              <button class="btn btn-success">+ Add Mentor</button>
            </div>

            <!-- Table -->
            <div class="card p-3">
              <table class="table table-hover mentor-table">
                <thead class="table-light">
                  <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Expertise</th>
                    <th>Assigned Batch</th>
                    <th>Action</th>
                  </tr>
                </thead>

                <tbody>
                  <tr>
                    <td>J</td>
                    <td>j@gmail.com</td>
                    <td><span class="expertise-tag">Java</span></td>
                    <td>Batch A</td>
                    <td class="mentor-actions">
                      <button class="btn btn-sm btn-outline-primary">
                        View
                      </button>
                      <button class="btn btn-sm btn-success">Edit</button>
                    </td>
                  </tr>

                  <tr>
                    <td>R</td>
                    <td>r@gmail.com</td>
                    <td><span class="expertise-tag">React</span></td>
                    <td>Batch B</td>
                    <td class="mentor-actions">
                      <button class="btn btn-sm btn-outline-primary">
                        View
                      </button>
                      <button class="btn btn-sm btn-success">Edit</button>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
